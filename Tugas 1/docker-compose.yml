# docker-compose.yml
version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: serial-web-nginx
    ports:
      - "7777:80"
      # Port 443 akan di-handle oleh reverse proxy VPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
    restart: unless-stopped
    networks:
      - serial-web-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  serial-web-network:
    driver: bridge

volumes:
  nginx-logs:
    driver: local
